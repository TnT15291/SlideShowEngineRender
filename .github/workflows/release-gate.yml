name: Release Gate

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

jobs:
  media-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Create synthetic test album
        run: |
          mkdir -p input
          ffmpeg -v error -f lavfi -i color=c=0x8b3a3a:s=640x360 -frames:v 1 input/001.jpg
          ffmpeg -v error -f lavfi -i color=c=0x315b7d:s=360x640 -frames:v 1 input/002.jpg
          for i in $(seq -w 3 130); do
            if ((10#$i % 2)); then cp input/001.jpg "input/$i.jpg"; else cp input/002.jpg "input/$i.jpg"; fi
          done
      - run: npm run check
      - run: npm run test:release
      - run: npm run test:regression
        env:
          REGRESSION_PACING: balanced

  premium-provider:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:premium-provider
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
